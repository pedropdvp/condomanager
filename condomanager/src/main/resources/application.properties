# ===== CondoManager SaaS - Configuracao base =====
spring.application.name=condomanager

# Perfil ativo por omissao (prod=MySQL). Use --spring.profiles.active=dev para H2.
spring.profiles.active=dev

# ===== JWT =====
# Em producao, definir via variavel de ambiente CONDO_JWT_SECRET
condomanager.jwt.secret=${CONDO_JWT_SECRET:troque-esta-chave-secreta-com-pelo-menos-32-bytes!!}
condomanager.jwt.expiration-ms=86400000

# ===== JPA / Hibernate (comum) =====
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===== Internacionalizacao (RNF07) =====
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ===== Email (notificacoes de cobranca) =====
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
