# =====================================================================
# Nginx — reverse proxy + TLS para o CondoManager.
# Colocar em /etc/nginx/sites-available/condomanager e ligar a sites-enabled.
# O bloco 443 é gerido/preenchido pelo Certbot (ver deploy/DEPLOY.md).
# =====================================================================

# HTTP -> redireciona para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name condomanager.example.com;

    # Desafio ACME do Let's Encrypt (Certbot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name condomanager.example.com;

    # Certificados (preenchidos pelo Certbot).
    ssl_certificate     /etc/letsencrypt/live/condomanager.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/condomanager.example.com/privkey.pem;

    # Hardening TLS.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Cabeçalhos de segurança.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limite de upload alinhado com spring.servlet.multipart (10MB) + margem.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
