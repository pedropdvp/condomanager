# =====================================================================
# Render Blueprint — CondoManager (deploy gratuito do sistema real).
# A base de dados MySQL é externa (Render não oferece MySQL gratuito):
# criar um MySQL 8 grátis (TiDB Cloud Serverless ou Aiven) e preencher os
# DB_* abaixo no painel da Render. Ver docs/DEPLOY-RENDER.md.
# =====================================================================
services:
  - type: web
    name: condomanager
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Segredo JWT gerado automaticamente pela Render (>=32 chars).
      - key: JWT_SECRET
        generateValue: true
      # Base de dados MySQL externa — preencher no painel (sync:false = secretos).
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: condomanager
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      # Email opcional (recuperação de password / convocatórias).
      - key: MAIL_ENABLED
        value: "false"
