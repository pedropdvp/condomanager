<!DOCTYPE html>
<html lang="pt" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CondoManager — Gestão de Condomínios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🏢 CondoManager</span>
        <button id="themeToggle" class="btn btn-outline-light btn-sm" type="button">Alternar tema</button>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h3 card-title">Sistema de Gestão de Condomínios</h1>
                    <p class="text-secondary">Plataforma SaaS multi-tenant — fundação (Fase 0) ativa.</p>
                    <hr>
                    <p class="mb-2">Estado do serviço:</p>
                    <pre id="health" class="bg-dark text-light p-3 rounded">a consultar…</pre>
                    <button id="refresh" class="btn btn-primary">Atualizar /api/v1/health</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const healthBox = document.getElementById('health');

    async function loadHealth() {
        healthBox.textContent = 'a consultar…';
        try {
            const res = await fetch('/api/v1/health');
            healthBox.textContent = JSON.stringify(await res.json(), null, 2);
        } catch (err) {
            healthBox.textContent = 'Erro: ' + err;
        }
    }

    document.getElementById('refresh').addEventListener('click', loadHealth);
    document.getElementById('themeToggle').addEventListener('click', () => {
        const html = document.documentElement;
        html.dataset.bsTheme = html.dataset.bsTheme === 'light' ? 'dark' : 'light';
    });

    loadHealth();
</script>
</body>
</html>
