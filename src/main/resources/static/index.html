<!DOCTYPE html>
<html lang="pt" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CondoManager — Gestão de Condomínios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">

<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand mb-0 h1" href="#">🏢 CondoManager</a>
        <div class="d-flex align-items-center gap-2">
            <span id="userBadge" class="navbar-text text-light small d-none"></span>
            <a href="/landing.html" class="btn btn-outline-light btn-sm">Página inicial</a>
            <button id="themeToggle" class="btn btn-outline-light btn-sm" type="button">🌓</button>
            <button id="logoutBtn" class="btn btn-light btn-sm d-none" type="button">Sair</button>
        </div>
    </div>
</nav>

<main class="container py-4">

    <!-- ===== LOGIN ===== -->
    <section id="loginView" class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h4 card-title mb-3">Entrar</h1>
                    <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" value="gestor.alfa@demo.local" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input id="password" type="password" class="form-control" value="gestor123" required>
                        </div>
                        <button id="loginBtn" class="btn btn-primary w-100" type="submit">Entrar</button>
                    </form>
                    <hr>
                    <p class="small text-secondary mb-1">Contas de demonstração:</p>
                    <ul class="small text-secondary mb-0">
                        <li>Gestor: <code>gestor.alfa@demo.local</code> / <code>gestor123</code></li>
                        <li>Admin: <code>admin@condomanager.local</code> / <code>admin123</code></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== APP ===== -->
    <section id="appView" class="d-none">
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item"><button class="nav-link active" data-tab="condominios">Condomínios</button></li>
            <li class="nav-item"><button class="nav-link" data-tab="votacoes">Votações</button></li>
        </ul>

        <div id="alert" class="alert d-none" role="alert"></div>

        <!-- Tab Condomínios -->
        <div id="tab-condominios">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h2 class="h5 mb-0">Condomínios</h2>
                <button class="btn btn-sm btn-outline-primary" onclick="loadCondominios()">↻ Atualizar</button>
            </div>
            <div id="condominiosTable" class="table-responsive"></div>
            <div id="detalhe" class="mt-4"></div>
        </div>

        <!-- Tab Votações -->
        <div id="tab-votacoes" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h2 class="h5 mb-0">Votações</h2>
                <button class="btn btn-sm btn-outline-primary" onclick="loadVotacoes()">↻ Atualizar</button>
            </div>
            <div id="votacoesTable" class="table-responsive"></div>
            <div id="resultadoVotacao" class="mt-4"></div>
        </div>
    </section>
</main>

<footer class="container pb-4">
    <span id="healthBadge" class="badge bg-secondary">serviço: …</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ---------- Estado / helpers ----------
const token = () => sessionStorage.getItem('cm_token');
const LABELS = {
    id:'ID', nome:'Nome', morada:'Morada', orcamentoAnual:'Orçamento anual (€)',
    numero:'Nº', tipologia:'Tipologia', permilagem:'Permilagem (‰)', areaM2:'Área (m²)',
    fracaoId:'Fração', mes:'Mês', ano:'Ano', valor:'Valor (€)', estado:'Estado',
    nif:'NIF', email:'Email', telefone:'Telefone', tipo:'Tipo', bloco:'Bloco',
    numeroPisos:'Pisos', tema:'Tema', tipoMaioria:'Maioria', data:'Data', hora:'Hora',
    local:'Local', ordemTrabalhos:'Ordem de trabalhos', condominioId:'Condomínio',
    edificioId:'Edifício', reuniaoId:'Reunião'
};
const HIDE = new Set(['idEmpresa','createdAt','updatedAt','dataInicio','dataFim']);
const money = ['orcamentoAnual','valor'];

function showAlert(msg, type='info') {
    const el = document.getElementById('alert');
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.classList.remove('d-none');
    setTimeout(() => el.classList.add('d-none'), 4000);
}

async function api(path) {
    const res = await fetch(path, { headers: { 'Authorization': 'Bearer ' + token() } });
    if (res.status === 401) { logout(); throw new Error('Sessão expirada — entre novamente.'); }
    if (!res.ok) throw new Error('Erro ' + res.status);
    return res.json();
}

function rows(data) {
    if (Array.isArray(data)) return data;
    return data.conteudo || data.content || [];
}

function fmt(key, val) {
    if (val === null || val === undefined) return '—';
    if (money.includes(key) && typeof val === 'number') return val.toFixed(2) + ' €';
    return String(val);
}

function table(items, actionsFn) {
    if (!items.length) return '<p class="text-secondary">Sem registos.</p>';
    const keys = Object.keys(items[0]).filter(k => !HIDE.has(k));
    let h = '<table class="table table-sm table-hover align-middle"><thead><tr>';
    keys.forEach(k => h += `<th>${LABELS[k] || k}</th>`);
    if (actionsFn) h += '<th class="text-end">Ações</th>';
    h += '</tr></thead><tbody>';
    items.forEach(it => {
        h += '<tr>';
        keys.forEach(k => h += `<td>${fmt(k, it[k])}</td>`);
        if (actionsFn) h += `<td class="text-end">${actionsFn(it)}</td>`;
        h += '</tr>';
    });
    return h + '</tbody></table>';
}

// ---------- Auth ----------
async function doLogin(email, password) {
    const res = await fetch('/api/v1/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });
    if (!res.ok) throw new Error('Credenciais inválidas.');
    const data = await res.json();
    sessionStorage.setItem('cm_token', data.token);
    sessionStorage.setItem('cm_user', JSON.stringify(data.utilizador));
    showApp();
}

function logout() {
    sessionStorage.removeItem('cm_token');
    sessionStorage.removeItem('cm_user');
    document.getElementById('appView').classList.add('d-none');
    document.getElementById('loginView').classList.remove('d-none');
    document.getElementById('logoutBtn').classList.add('d-none');
    document.getElementById('userBadge').classList.add('d-none');
}

function showApp() {
    const user = JSON.parse(sessionStorage.getItem('cm_user') || '{}');
    document.getElementById('loginView').classList.add('d-none');
    document.getElementById('appView').classList.remove('d-none');
    document.getElementById('logoutBtn').classList.remove('d-none');
    const badge = document.getElementById('userBadge');
    badge.textContent = `${user.nome || ''} · ${(user.perfis || []).join(', ')}`;
    badge.classList.remove('d-none');
    loadCondominios();
}

// ---------- Dados ----------
async function loadCondominios() {
    try {
        const data = await api('/api/v1/condominios?size=50');
        document.getElementById('condominiosTable').innerHTML = table(rows(data), c => `
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-secondary" onclick="loadFracoes(${c.id},'${esc(c.nome)}')">Frações</button>
              <button class="btn btn-outline-secondary" onclick="loadQuotas(${c.id},'${esc(c.nome)}')">Quotas</button>
              <button class="btn btn-outline-primary" onclick="baixar(${c.id},'pdf')">PDF</button>
              <button class="btn btn-outline-success" onclick="baixar(${c.id},'excel')">Excel</button>
            </div>`);
        document.getElementById('detalhe').innerHTML = '';
    } catch (e) { showAlert(e.message, 'danger'); }
}

async function loadFracoes(cid, nome) {
    try {
        const data = await api(`/api/v1/fracoes?condominioId=${cid}&size=50`);
        document.getElementById('detalhe').innerHTML =
            `<h3 class="h6">Frações — ${nome}</h3>` + table(rows(data));
    } catch (e) { showAlert(e.message, 'danger'); }
}

async function loadQuotas(cid, nome) {
    try {
        const data = await api(`/api/v1/quotas?condominioId=${cid}&size=50`);
        document.getElementById('detalhe').innerHTML =
            `<h3 class="h6">Quotas — ${nome}</h3>` + table(rows(data));
    } catch (e) { showAlert(e.message, 'danger'); }
}

async function baixar(cid, fmt) {
    try {
        const path = fmt === 'pdf' ? `/api/v1/relatorios/quotas?condominioId=${cid}`
                                   : `/api/v1/relatorios/quotas/excel?condominioId=${cid}`;
        const res = await fetch(path, { headers: { 'Authorization': 'Bearer ' + token() } });
        if (!res.ok) throw new Error('Erro ' + res.status);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `relatorio-quotas-${cid}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        showAlert('Relatório descarregado.', 'success');
    } catch (e) { showAlert(e.message, 'danger'); }
}

async function loadVotacoes() {
    try {
        const data = await api('/api/v1/votacoes?size=50');
        document.getElementById('votacoesTable').innerHTML = table(rows(data), v => `
            <button class="btn btn-sm btn-outline-primary" onclick="loadResultado(${v.id})">Resultado</button>`);
        document.getElementById('resultadoVotacao').innerHTML = '';
    } catch (e) { showAlert(e.message, 'danger'); }
}

async function loadResultado(id) {
    try {
        const r = await api(`/api/v1/votacoes/${id}/resultado`);
        const aprov = r.aprovado
            ? '<span class="badge bg-success">APROVADO</span>'
            : '<span class="badge bg-danger">REPROVADO</span>';
        document.getElementById('resultadoVotacao').innerHTML = `
          <div class="card"><div class="card-body">
            <h3 class="h6">Resultado — ${esc(r.tema)} ${aprov}</h3>
            <p class="small text-secondary mb-2">Maioria exigida: ${r.tipoMaioria} · Estado: ${r.estado}</p>
            <table class="table table-sm w-auto">
              <tr><th>Capital total</th><td>${r.capitalTotal} ‰</td></tr>
              <tr><th>Capital presente</th><td>${r.capitalPresente} ‰</td></tr>
              <tr class="table-success"><th>A favor (SIM)</th><td>${r.somaSim} ‰</td></tr>
              <tr class="table-danger"><th>Contra (NÃO)</th><td>${r.somaNao} ‰</td></tr>
              <tr><th>Abstenção</th><td>${r.somaAbstencao} ‰</td></tr>
              <tr><th>Nº de votos</th><td>${r.numeroVotos}</td></tr>
            </table>
            <p class="small text-secondary mb-0">A contagem é por <strong>permilagem</strong> (peso da fração), não por número de pessoas — regime da propriedade horizontal (Lei 8/2022).</p>
          </div></div>`;
    } catch (e) { showAlert(e.message, 'danger'); }
}

function esc(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ---------- Health ----------
async function loadHealth() {
    try {
        const r = await fetch('/api/v1/health');
        const d = await r.json();
        const b = document.getElementById('healthBadge');
        b.className = 'badge bg-success';
        b.textContent = 'serviço: ' + (d.status || 'UP');
    } catch {
        const b = document.getElementById('healthBadge');
        b.className = 'badge bg-danger'; b.textContent = 'serviço: indisponível';
    }
}

// ---------- Eventos ----------
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('loginError');
    err.classList.add('d-none');
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'A entrar…';
    try {
        await doLogin(document.getElementById('email').value, document.getElementById('password').value);
    } catch (ex) {
        err.textContent = ex.message; err.classList.remove('d-none');
    } finally {
        btn.disabled = false; btn.textContent = 'Entrar';
    }
});

document.getElementById('logoutBtn').addEventListener('click', logout);

document.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const tab = b.dataset.tab;
    document.getElementById('tab-condominios').classList.toggle('d-none', tab !== 'condominios');
    document.getElementById('tab-votacoes').classList.toggle('d-none', tab !== 'votacoes');
    if (tab === 'votacoes') loadVotacoes();
}));

const themeSaved = localStorage.getItem('theme');
if (themeSaved) document.documentElement.dataset.bsTheme = themeSaved;
document.getElementById('themeToggle').addEventListener('click', () => {
    const h = document.documentElement;
    h.dataset.bsTheme = h.dataset.bsTheme === 'light' ? 'dark' : 'light';
    localStorage.setItem('theme', h.dataset.bsTheme);
});

// ---------- Arranque ----------
loadHealth();
if (token()) showApp();
</script>
</body>
</html>
