services:
  mysql:
    image: mysql:8.0
    container_name: condomanager-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-condomanager}
      MYSQL_USER: ${DB_USER:-condomanager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-condomanager}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - condomanager-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  condomanager-mysql-data:
