<!DOCTYPE html>
<html lang="pt" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CondoManager SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/theme.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; }
        #sidebar { min-height: 100vh; }
        @media (max-width: 768px){ #sidebar{ min-height:auto; } }
    </style>
</head>
<body>
<div class="d-flex flex-column flex-md-row">
    <!-- Sidebar -->
    <aside id="sidebar" class="bg-body-tertiary border-end p-3 d-flex flex-column">
        <div class="mb-4">
            <div class="brand-kicker mb-1">Sistema de Gestão</div>
            <div class="brand-wordmark">Condo<span class="text-primary">Manager</span></div>
        </div>
        <nav class="nav flex-column gap-1" id="menu"></nav>
        <hr class="my-3" style="border-color: var(--line);">
        <div class="form-check form-switch mt-auto">
            <input class="form-check-input" type="checkbox" id="darkSwitch">
            <label class="form-check-label small" for="darkSwitch">Modo escuro</label>
        </div>
        <button id="btnRegisto" class="btn btn-sm btn-primary w-100 mt-3 d-none" onclick="abrirRegisto()">+ Criar novo acesso</button>
        <button class="btn btn-sm btn-outline-secondary w-100 mt-2" onclick="sair()">Terminar sessão</button>
    </aside>

    <!-- Conteúdo -->
    <main class="flex-grow-1 p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 id="tituloSecao" class="h4 mb-0">Dashboard</h2>
            <span class="text-muted small" id="utilizadorInfo"></span>
        </div>
        <div id="alerta"></div>
        <div id="conteudo"></div>
    </main>
</div>

<!-- Modal: criar novo acesso (apenas ADMIN_SISTEMA) -->
<div class="modal fade" id="modalRegisto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="formRegisto">
                <div class="modal-header">
                    <h5 class="modal-title">Criar novo acesso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-3">Cria um login para um novo utilizador da plataforma.</p>
                    <div id="alertaRegisto"></div>
                    <div class="mb-3">
                        <label class="form-label" for="r_nome">Nome</label>
                        <input class="form-control" id="r_nome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="r_email">Email</label>
                        <input type="email" class="form-control" id="r_email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="r_password">Password</label>
                        <input type="password" class="form-control" id="r_password" required minlength="6">
                        <div class="form-text small">Mínimo de 6 caracteres.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="r_perfil">Perfil</label>
                        <select class="form-select" id="r_perfil" required>
                            <option value="ADMIN_SISTEMA">Administrador do Sistema</option>
                            <option value="GESTOR">Gestor</option>
                            <option value="FUNCIONARIO">Funcionário</option>
                            <option value="ADMIN_CONDOMINIO">Administrador de Condomínio</option>
                            <option value="CONDOMINO" selected>Condómino</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Permissões de acesso (ligue/desligue por funcionalidade)</label>
                        <div id="gridPermissoes" class="perm-grid">
                            <span class="text-muted small">A carregar permissões...</span>
                        </div>
                        <div class="form-text small">Pré-preenchidas pelo perfil escolhido; pode ajustar cada ação.</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-sm btn-primary">Criar acesso</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="config.js"></script>
<script>
// ===== Autenticação =====
const API_BASE = window.CONDO_API_BASE || '';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'index.html';
document.getElementById('utilizadorInfo').textContent =
    (localStorage.getItem('nome') || '') + ' · ' + (JSON.parse(localStorage.getItem('perfis')||'[]').join(', '));

function sair() { localStorage.clear(); window.location.href = 'index.html'; }

async function api(path, opts = {}) {
    opts.headers = Object.assign({ 'Authorization': 'Bearer ' + token }, opts.headers || {});
    const resp = await fetch(API_BASE + path, opts);
    if (resp.status === 401 || resp.status === 403) {
        if (path !== '/api/dashboard') mostrarAlerta('Sem permissão ou sessão expirada.', 'warning');
        if (resp.status === 401) { sair(); }
        throw new Error('auth');
    }
    return resp;
}

function mostrarAlerta(msg, tipo = 'success') {
    document.getElementById('alerta').innerHTML =
        '<div class="alert alert-' + tipo + ' alert-dismissible py-2">' + msg +
        '<button class="btn-close" data-bs-dismiss="alert"></button></div>';
}

// ===== Configuração dos módulos (config-driven CRUD) =====
// editavel  -> tem endpoint PUT (Alterar)
// apagavel  -> tem endpoint DELETE (Apagar)
const MODULOS = {
    dashboard:   { titulo: 'Dashboard', dashboard: true },
    empresas:    { titulo: 'Empresas', endpoint: '/api/empresas', editavel:true, apagavel:true,
        colunas: ['id','nome','nif','email','plano'],
        campos: [f('nome'),f('nif'),f('email'),f('telefone'),f('morada'),
                 sel('plano',['STARTER','BUSINESS','ENTERPRISE'])] },
    condominios: { titulo: 'Condomínios', endpoint: '/api/condominios', editavel:true, apagavel:true,
        colunas: ['id','nome','morada','orcamentoAnual','empresaId'],
        campos: [f('nome'),f('morada'),num('orcamentoAnual'),ref('empresaId',true)] },
    edificios:   { titulo: 'Edifícios', endpoint: '/api/edificios', editavel:true, apagavel:true,
        colunas: ['id','nome','morada','numPisos','condominioId'],
        campos: [f('nome'),f('morada'),num('numPisos'),ref('condominioId',true)] },
    fracoes:     { titulo: 'Frações', endpoint: '/api/fracoes', editavel:true, apagavel:true,
        colunas: ['id','numero','condominioId','edificioId','piso','permilagem','tipologia'],
        campos: [f('numero',true),ref('condominioId',true),ref('edificioId'),
                 num('piso'),num('permilagem'),f('tipologia')] },
    condominos:  { titulo: 'Condóminos', endpoint: '/api/condominos', editavel:true, apagavel:true,
        colunas: ['id','nome','nif','email','tipo','fracaoId'],
        campos: [f('nome',true),f('nif'),f('email'),f('telefone'),
                 sel('tipo',['PROPRIETARIO','INQUILINO']),ref('fracaoId')] },
    quotas:      { titulo: 'Quotas', endpoint: '/api/quotas',
        colunas: ['id','mes','ano','valor','estado','fracaoId'], somenteLeitura: true,
        acaoExtra: { label: 'Gerar faturação do mês', metodo: 'POST', path: '/api/quotas/gerar' } },
    pagamentos:  { titulo: 'Pagamentos', endpoint: '/api/pagamentos', criarPath: '/api/pagamentos',
        colunas: ['id','valor','data','metodo','estado','quotaId'],
        campos: [num('valor',true),sel('metodo',['MBWAY','TRANSFERENCIA','PAYPAL']),ref('quotaId',true)] },
    despesas:    { titulo: 'Despesas', endpoint: '/api/despesas', editavel:true, apagavel:true,
        colunas: ['id','descricao','valor','categoria','estado','condominioId'],
        campos: [f('descricao',true),num('valor',true),f('categoria'),ref('condominioId',true)] },
    atas:        { titulo: 'Atas', endpoint: '/api/atas', editavel:true, apagavel:true,
        colunas: ['id','titulo','dataReuniao','arquivada','condominioId'],
        campos: [f('titulo',true),f('descricao'),date('dataReuniao'),ref('condominioId',true)] },
    reunioes:    { titulo: 'Reuniões', endpoint: '/api/reunioes', criarPath:'/api/reunioes', editavel:true, apagavel:true,
        colunas: ['id','assunto','data','hora','local','estado','condominioId'],
        campos: [f('assunto'),date('data',true),time('hora'),f('local'),ref('condominioId',true)] },
    votacoes:    { titulo: 'Votações', endpoint: '/api/votacoes',
        colunas: ['id','tema','estado','condominioId'],
        campos: [f('tema',true),ref('reuniaoId'),ref('condominioId',true)] },
    mensagens:   { titulo: 'Mensagens', endpoint: '/api/mensagens', criarPath:'/api/mensagens',
        colunas: ['id','assunto','destino','dataEnvio','condominioId'],
        campos: [f('assunto',true),f('conteudo'),sel('destino',['TODOS','GRUPO','CONDOMINO']),
                 ref('condominoId'),ref('condominioId',true)] },
    documentos:  { titulo: 'Documentos', endpoint: '/api/documentos', criarPath:'/api/documentos', apagavel:true,
        colunas: ['id','nome','tipo','dataUpload','condominioId'],
        campos: [f('nome',true),sel('tipo',['REGULAMENTO','CONTRATO','ORCAMENTO','ATA','FATURA','APOLICE']),
                 f('ficheiro'),ref('condominioId',true)] },
    ocorrencias: { titulo: 'Ocorrências', endpoint: '/api/ocorrencias', criarPath:'/api/ocorrencias', apagavel:true,
        colunas: ['id','titulo','estado','prioridade','condominoId'],
        campos: [f('titulo',true),f('descricao'),sel('prioridade',['BAIXA','MEDIA','ALTA']),ref('condominoId')] },
    historico:   { titulo: 'Histórico (Auditoria)', endpoint: '/api/historico',
        colunas: ['id','utilizador','operacao','dataHora'], somenteLeitura: true },
    relatorios:  { titulo: 'Relatórios', relatorio: true }
};

function f(nome, req){ return { nome, tipo:'text', req: !!req }; }
function num(nome, req){ return { nome, tipo:'number', req: !!req }; }
function date(nome, req){ return { nome, tipo:'date', req: !!req }; }
function time(nome, req){ return { nome, tipo:'time', req: !!req }; }
function sel(nome, opcoes){ return { nome, tipo:'select', opcoes, req:false }; }
function ref(nome, req){ return { nome, tipo:'ref', req: !!req }; }

// Etiquetas legíveis para os campos do formulário.
const LABELS = {
    nome:'Nome', nif:'NIF', email:'Email', telefone:'Telefone', morada:'Morada', plano:'Plano',
    orcamentoAnual:'Orçamento anual (€)', empresaId:'Empresa', condominioId:'Condomínio',
    numPisos:'Nº de pisos', numero:'Número', piso:'Piso', permilagem:'Permilagem', tipologia:'Tipologia',
    edificioId:'Edifício', fracaoId:'Fração', tipo:'Tipo', conteudo:'Conteúdo', destino:'Destino',
    condominoId:'Condómino', valor:'Valor (€)', metodo:'Método', quotaId:'Quota', descricao:'Descrição',
    categoria:'Categoria', titulo:'Título', dataReuniao:'Data da reunião', assunto:'Assunto',
    data:'Data', hora:'Hora', local:'Local', tema:'Tema', reuniaoId:'Reunião', ficheiro:'Ficheiro',
    prioridade:'Prioridade'
};
function rotulo(nome){ return LABELS[nome] || nome; }

// Registo de referências: cada campo *Id resolve para outro módulo, mostrando o ID
// e os campos que o identificam (ex.: uma Votação mostra a sua Reunião e Condomínio).
// label -> texto da dropdown (ID + identificadores); short -> nome curto para a tabela.
// needs -> outras referencias a carregar para resolver nomes dentro do label.
const REFS = {
    empresaId:    { endpoint:'/api/empresas',    label: o => `#${o.id} · ${o.nome}${o.nif ? ' ('+o.nif+')' : ''}`,                short: o => o.nome },
    condominioId: { endpoint:'/api/condominios', label: o => `#${o.id} · ${o.nome}`,                                               short: o => o.nome },
    edificioId:   { endpoint:'/api/edificios',   needs:['condominioId'],
                    label: o => `#${o.id} · ${o.nome} — ${nomeRef('condominioId', o.condominioId)}`,                               short: o => o.nome },
    fracaoId:     { endpoint:'/api/fracoes',     needs:['condominioId','edificioId'],
                    label: o => `#${o.id} · Fração ${o.numero} — ${nomeRef('condominioId', o.condominioId)}`
                                 + (o.edificioId ? ` / ${nomeRef('edificioId', o.edificioId)}` : ''),                              short: o => `Fração ${o.numero}` },
    condominoId:  { endpoint:'/api/condominos',  label: o => `#${o.id} · ${o.nome}`,                                               short: o => o.nome },
    quotaId:      { endpoint:'/api/quotas',      needs:['fracaoId'],
                    label: o => `#${o.id} · ${o.mes}/${o.ano} — €${o.valor} (${nomeRef('fracaoId', o.fracaoId)})`,                 short: o => `${o.mes}/${o.ano}` },
    reuniaoId:    { endpoint:'/api/reunioes',    needs:['condominioId'],
                    label: o => `#${o.id} · ${o.assunto || '(sem assunto)'}${o.data ? ' — '+o.data : ''} — ${nomeRef('condominioId', o.condominioId)}`, short: o => (o.assunto || `Reunião #${o.id}`) }
};

// Resolve o nome curto de uma referencia a partir da cache (senao devolve o ID).
function nomeRef(campo, id) {
    if (id === null || id === undefined) return '—';
    const lista = refCache[campo];
    if (Array.isArray(lista)) {
        const o = lista.find(x => x.id === id);
        if (o && REFS[campo]) return REFS[campo].short(o);
    }
    return id;
}

// Cache das listas de referência (evita pedidos repetidos por sessão).
const refCache = {};
// Invalida a cache para que as dropdowns reflitam registos criados/alterados/apagados.
function invalidarRefs() { for (const k in refCache) delete refCache[k]; }
async function carregarRef(campoNome) {
    if (refCache[campoNome] !== undefined) return refCache[campoNome];
    const r = REFS[campoNome];
    try {
        // fetch silencioso (sem o wrapper api()) para não disparar alerta a quem
        // não tem permissão de consulta sobre o módulo referenciado.
        const resp = await fetch(API_BASE + r.endpoint, { headers: { 'Authorization': 'Bearer ' + token } });
        refCache[campoNome] = resp.ok ? await resp.json() : null;
    } catch (e) { refCache[campoNome] = null; }
    return refCache[campoNome];
}

// ===== Navegação =====
const menu = document.getElementById('menu');
Object.keys(MODULOS).forEach(k => {
    const a = document.createElement('a');
    a.className = 'nav-link'; a.href = '#' + k; a.textContent = MODULOS[k].titulo;
    a.onclick = () => abrir(k);
    menu.appendChild(a);
});

function marcarAtivo(k){
    document.querySelectorAll('#menu .nav-link').forEach(a =>
        a.classList.toggle('active', a.getAttribute('href') === '#'+k));
}

async function abrir(k) {
    const m = MODULOS[k];
    document.getElementById('tituloSecao').textContent = m.titulo;
    document.getElementById('alerta').innerHTML = '';
    marcarAtivo(k);
    if (m.dashboard) return renderDashboard();
    if (m.relatorio) return renderRelatorios();
    return renderCrud(k, m);
}

// ===== Dashboard =====
async function renderDashboard() {
    const c = document.getElementById('conteudo');
    c.innerHTML = '<p class="text-muted">A carregar indicadores...</p>';
    try {
        const d = await (await api('/api/dashboard')).json();
        const card = (titulo, valor, cor) =>
            `<div class="col-sm-6 col-lg-4 col-xl-2"><div class="card text-center shadow-sm h-100">
             <div class="card-body"><div class="kpi text-${cor}">${valor}</div>
             <div class="small text-muted">${titulo}</div></div></div></div>`;
        c.innerHTML = '<div class="row g-3">' +
            card('Condomínios', d.condominiosAtivos, 'primary') +
            card('Condóminos', d.condominosAtivos, 'primary') +
            card('Frações', d.fracoes, 'info') +
            card('Quotas por pagar', d.quotasPorPagar, 'warning') +
            card('Dívidas (€)', Number(d.dividasPendentes).toFixed(2), 'danger') +
            card('Receita mês (€)', Number(d.receitaMesAtual).toFixed(2), 'success') +
            '</div>';
    } catch(e){ c.innerHTML = '<div class="alert alert-warning">Não foi possível carregar o dashboard.</div>'; }
}

// ===== Relatórios =====
function renderRelatorios() {
    document.getElementById('conteudo').innerHTML =
        `<div class="card shadow-sm"><div class="card-body">
         <h5>Quotas em atraso / pendentes</h5>
         <p class="text-muted small">Gerado com JasperReports em PDF.</p>
         <button class="btn btn-primary" onclick="abrirRelatorio()">Abrir PDF</button>
         </div></div>`;
}
async function abrirRelatorio() {
    try {
        const resp = await api('/api/relatorios/quotas-atraso');
        const blob = await resp.blob();
        window.open(URL.createObjectURL(blob), '_blank');
    } catch(e){ mostrarAlerta('Não foi possível gerar o relatório.', 'danger'); }
}

// ===== CRUD genérico =====
let selecionado = null;   // { k, id } do registo selecionado na tabela
let listaAtual = [];      // registos atualmente apresentados na tabela

async function renderCrud(k, m) {
    selecionado = null;
    const c = document.getElementById('conteudo');
    let formHtml = '';
    if (!m.somenteLeitura && m.campos) {
        formHtml = `<div class="card shadow-sm mb-3"><div class="card-body">
            <h6 class="card-title" id="tituloForm">Novo registo</h6>
            <form id="formCrud" class="row g-2">` +
            m.campos.map(campoHtml).join('') +
            `<div class="col-12 d-flex flex-wrap gap-2 mt-1">
                <button type="submit" id="btnAdicionar" class="btn btn-primary btn-sm">Adicionar</button>` +
                (m.editavel ? `<button type="button" id="btnAlterar" class="btn btn-warning btn-sm" disabled>Alterar</button>` : '') +
                (m.apagavel ? `<button type="button" id="btnApagar" class="btn btn-danger btn-sm" disabled>Apagar</button>` : '') +
                `<button type="button" id="btnCancelar" class="btn btn-outline-secondary btn-sm d-none">Cancelar seleção</button>
             </div>
            </form>
            <div class="form-text small mt-2">Clique numa linha da tabela para a selecionar e depois use <b>Alterar</b> ou <b>Apagar</b>.</div>
            </div></div>`;
    }
    let extraHtml = '';
    if (m.acaoExtra) {
        extraHtml = `<button class="btn btn-outline-primary btn-sm mb-3" onclick="acaoExtra('${k}')">${m.acaoExtra.label}</button>`;
    }
    c.innerHTML = formHtml + extraHtml + '<div id="tabela"><p class="text-muted">A carregar...</p></div>';

    if (document.getElementById('formCrud')) {
        document.getElementById('formCrud').addEventListener('submit', (e) => { e.preventDefault(); criar(k, m); });
        const bAlt = document.getElementById('btnAlterar');
        const bApg = document.getElementById('btnApagar');
        const bCan = document.getElementById('btnCancelar');
        if (bAlt) bAlt.addEventListener('click', () => alterar(k, m));
        if (bApg) bApg.addEventListener('click', () => apagar(k, m));
        if (bCan) bCan.addEventListener('click', () => cancelarSelecao(m));
        popularReferencias(m);
    }
    carregarLista(k, m);
}

function campoHtml(campo) {
    const id = 'c_' + campo.nome;
    const lbl = `<label class="form-label small mb-0" for="${id}">${rotulo(campo.nome)}${campo.req?' *':''}</label>`;
    if (campo.tipo === 'ref') {
        // Dropdown preenchida em popularReferencias(); fallback para nº caso falhe.
        return `<div class="col-md-4">${lbl}<select id="${id}" data-ref="${campo.nome}" ${campo.req?'required':''}
            class="form-select form-select-sm"><option value="">A carregar…</option></select></div>`;
    }
    if (campo.tipo === 'select') {
        return `<div class="col-md-3">${lbl}<select id="${id}" class="form-select form-select-sm">
            <option value=""></option>` +
            campo.opcoes.map(o => `<option>${o}</option>`).join('') + `</select></div>`;
    }
    return `<div class="col-md-3">${lbl}<input id="${id}" type="${campo.tipo}" ${campo.req?'required':''}
        class="form-control form-control-sm"></div>`;
}

// Preenche as dropdowns de referência (campos *Id) com ID + dados identificadores.
async function popularReferencias(m) {
    const campos = (m.campos || []).filter(c => c.tipo === 'ref');
    for (const campo of campos) {
        const sel = document.getElementById('c_' + campo.nome);
        if (!sel) continue;
        // Carrega referencias dependentes para resolver nomes dentro do label.
        const needs = (REFS[campo.nome] && REFS[campo.nome].needs) || [];
        for (const dep of needs) await carregarRef(dep);
        const dados = await carregarRef(campo.nome);
        if (dados === null) {
            // Sem acesso de consulta ao módulo referenciado: usa input numérico.
            const novo = document.createElement('input');
            novo.type = 'number'; novo.id = sel.id; novo.className = 'form-control form-control-sm';
            novo.setAttribute('data-ref', campo.nome);
            if (campo.req) novo.required = true;
            sel.replaceWith(novo);
            continue;
        }
        const r = REFS[campo.nome];
        let opts = '<option value="">— selecione —</option>';
        opts += dados.map(o => `<option value="${o.id}">${r.label(o)}</option>`).join('');
        sel.innerHTML = opts;
    }
}

async function carregarLista(k, m) {
    try {
        const dados = await (await api(m.endpoint)).json();
        listaAtual = dados;
        const t = document.getElementById('tabela');
        if (!dados.length) { t.innerHTML = '<p class="text-muted">Sem registos.</p>'; return; }
        const cols = m.colunas;
        const selecionavel = !m.somenteLeitura && (m.editavel || m.apagavel);
        // Resolve colunas de referência para mostrar o nome em vez do ID.
        const mapaRefs = {};
        for (const c of cols) {
            if (!REFS[c]) continue;
            const lista = await carregarRef(c);
            if (lista) { const mp = {}; lista.forEach(o => mp[o.id] = o); mapaRefs[c] = mp; }
        }
        let html = '<div class="table-responsive"><table class="table table-sm table-hover align-middle">'
            + '<thead><tr>' + cols.map(c => `<th>${c === 'id' ? 'ID' : rotulo(c)}</th>`).join('') + '</tr></thead><tbody>';
        dados.forEach(row => {
            const attrs = selecionavel ? ` style="cursor:pointer" onclick="selecionar('${k}', ${row.id})"` : '';
            html += `<tr data-row-id="${row.id}"${attrs}>` + cols.map(c => `<td>${fmtCelula(c, row[c], mapaRefs)}</td>`).join('') + '</tr>';
        });
        html += '</tbody></table></div>';
        t.innerHTML = html;
        // Mantém o destaque caso ainda haja um registo selecionado.
        if (selecionado && selecionado.k === k) {
            const tr = document.querySelector(`#tabela tr[data-row-id="${selecionado.id}"]`);
            if (tr) tr.classList.add('table-active');
        }
    } catch(e) {
        document.getElementById('tabela').innerHTML =
            '<div class="alert alert-warning">Sem acesso a este módulo com o perfil atual.</div>';
    }
}

function fmt(v){ if (v === null || v === undefined) return '—'; if (v === true) return 'Sim'; if (v===false) return 'Não'; return v; }

// Mostra o nome de uma referência (em vez do ID) quando resolúvel; senão o valor cru.
function fmtCelula(col, val, mapaRefs){
    if (REFS[col] && val !== null && val !== undefined && mapaRefs[col] && mapaRefs[col][val]) {
        return fmt(REFS[col].short(mapaRefs[col][val]));
    }
    return fmt(val);
}

// Seleciona uma linha: realça e carrega os valores no formulário.
function selecionar(k, id) {
    const m = MODULOS[k];
    const row = listaAtual.find(r => r.id === id);
    if (!row) return;
    selecionado = { k, id: row.id };
    document.querySelectorAll('#tabela tr').forEach(tr => tr.classList.remove('table-active'));
    const tr = document.querySelector(`#tabela tr[data-row-id="${row.id}"]`);
    if (tr) tr.classList.add('table-active');

    (m.campos || []).forEach(campo => {
        const el = document.getElementById('c_' + campo.nome);
        if (!el) return;
        let val = row[campo.nome];
        if (campo.tipo === 'time' && typeof val === 'string') val = val.substring(0,5); // HH:mm
        el.value = (val === null || val === undefined) ? '' : val;
    });

    const tituloForm = document.getElementById('tituloForm');
    if (tituloForm) tituloForm.textContent = 'Registo selecionado: #' + row.id;
    const bAlt = document.getElementById('btnAlterar'); if (bAlt) bAlt.disabled = false;
    const bApg = document.getElementById('btnApagar'); if (bApg) bApg.disabled = false;
    const bCan = document.getElementById('btnCancelar'); if (bCan) bCan.classList.remove('d-none');
}

function cancelarSelecao(m) {
    selecionado = null;
    document.querySelectorAll('#tabela tr').forEach(tr => tr.classList.remove('table-active'));
    const form = document.getElementById('formCrud'); if (form) form.reset();
    popularReferencias(m);
    const tituloForm = document.getElementById('tituloForm'); if (tituloForm) tituloForm.textContent = 'Novo registo';
    const bAlt = document.getElementById('btnAlterar'); if (bAlt) bAlt.disabled = true;
    const bApg = document.getElementById('btnApagar'); if (bApg) bApg.disabled = true;
    const bCan = document.getElementById('btnCancelar'); if (bCan) bCan.classList.add('d-none');
}

// Lê os campos do formulário para um objeto a enviar.
function lerFormulario(m) {
    const corpo = {};
    m.campos.forEach(campo => {
        const el = document.getElementById('c_' + campo.nome);
        if (!el) return;
        let val = el.value;
        if (val === '') return;
        if (campo.tipo === 'number' || campo.tipo === 'ref') val = Number(val);
        corpo[campo.nome] = val;
    });
    return corpo;
}

async function criar(k, m) {
    try {
        const resp = await api(m.criarPath || m.endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(lerFormulario(m))
        });
        if (resp.ok) { invalidarRefs(); mostrarAlerta('Registo criado com sucesso.'); cancelarSelecao(m); carregarLista(k, m); }
        else { const err = await resp.json().catch(()=>({})); mostrarAlerta(err.mensagem || 'Erro ao criar.', 'danger'); }
    } catch(e){ /* alerta já mostrado */ }
}

async function alterar(k, m) {
    if (!selecionado) return;
    const id = selecionado.id;
    try {
        const resp = await api(m.endpoint + '/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(lerFormulario(m))
        });
        if (resp.ok) { invalidarRefs(); mostrarAlerta('Registo #' + id + ' alterado com sucesso.'); cancelarSelecao(m); carregarLista(k, m); }
        else { const err = await resp.json().catch(()=>({})); mostrarAlerta(err.mensagem || 'Erro ao alterar.', 'danger'); }
    } catch(e){ /* alerta já mostrado */ }
}

async function apagar(k, m) {
    if (!selecionado) return;
    const id = selecionado.id;
    if (!confirm('Apagar o registo #' + id + '?')) return;
    try {
        const resp = await api(m.endpoint + '/' + id, { method: 'DELETE' });
        if (resp.ok) { invalidarRefs(); mostrarAlerta('Registo #' + id + ' apagado.'); cancelarSelecao(m); carregarLista(k, m); }
        else mostrarAlerta('Não foi possível apagar.', 'danger');
    } catch(e){}
}

async function acaoExtra(k) {
    const m = MODULOS[k];
    try {
        const resp = await api(m.acaoExtra.path, { method: m.acaoExtra.metodo });
        if (resp.ok) { mostrarAlerta('Operação concluída.'); carregarLista(k, m); }
    } catch(e){}
}

// ===== Criar novo acesso (registo) com permissões granulares =====
let modalRegisto = null;
let matrizPermissoes = null;

async function carregarMatriz() {
    if (matrizPermissoes) return true;
    try {
        // fetch direto (sem o wrapper api()) para não disparar alerta a quem não tem permissão
        const resp = await fetch(API_BASE + '/api/permissoes', { headers: { 'Authorization': 'Bearer ' + token } });
        if (resp.ok) { matrizPermissoes = await resp.json(); return true; }
    } catch (e) { /* sem permissão ou erro de ligação */ }
    return false;
}

// O botão "Criar novo acesso" só aparece a quem tem CRIAR em Utilizadores
carregarMatriz().then(ok => { if (ok) document.getElementById('btnRegisto').classList.remove('d-none'); });

function renderPermissoes(perfil) {
    const alvo = document.getElementById('gridPermissoes');
    if (!matrizPermissoes) { alvo.innerHTML = '<span class="text-muted small">Permissões indisponíveis.</span>'; return; }
    const acoes = matrizPermissoes.acoes;
    let html = '<div class="perm-head"><span></span>' +
        acoes.map(a => '<span>' + a.etiqueta + '</span>').join('') + '</div>';
    html += matrizPermissoes.funcionalidades.map(f => {
        const ativos = f.perfis[perfil] || [];
        const cells = acoes.map(a => {
            const on = ativos.includes(a.codigo) ? ' checked' : '';
            return '<label class="perm-cell" title="' + a.etiqueta + ' · ' + f.etiqueta +
                   '"><input type="checkbox" data-func="' + f.funcionalidade + '" data-acao="' + a.codigo + '"' + on + '></label>';
        }).join('');
        return '<div class="perm-row"><span class="perm-func">' + f.etiqueta + '</span>' + cells + '</div>';
    }).join('');
    alvo.innerHTML = html;
}

function coletarPermissoes() {
    const mapa = {};
    document.querySelectorAll('#gridPermissoes input[type="checkbox"]:checked').forEach(cb => {
        (mapa[cb.dataset.func] = mapa[cb.dataset.func] || []).push(cb.dataset.acao);
    });
    return mapa;
}

async function abrirRegisto() {
    modalRegisto = modalRegisto || new bootstrap.Modal(document.getElementById('modalRegisto'));
    document.getElementById('formRegisto').reset();
    document.getElementById('alertaRegisto').innerHTML = '';
    await carregarMatriz();
    renderPermissoes(document.getElementById('r_perfil').value);
    modalRegisto.show();
}

document.getElementById('r_perfil').addEventListener('change', (e) => renderPermissoes(e.target.value));

document.getElementById('formRegisto').addEventListener('submit', async (e) => {
    e.preventDefault();
    const a = document.getElementById('alertaRegisto');
    a.innerHTML = '<span class="text-muted small">A criar acesso...</span>';
    const corpo = {
        nome: document.getElementById('r_nome').value.trim(),
        email: document.getElementById('r_email').value.trim(),
        password: document.getElementById('r_password').value,
        perfil: document.getElementById('r_perfil').value,
        permissoes: coletarPermissoes()
    };
    try {
        const resp = await api('/api/auth/registo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(corpo)
        });
        if (resp.ok) {
            const u = await resp.json();
            modalRegisto.hide();
            mostrarAlerta('Novo acesso criado: ' + u.email + ' (' + corpo.perfil + ').');
        } else {
            const err = await resp.json().catch(() => ({}));
            a.innerHTML = '<div class="alert alert-danger py-2 mb-0">' + (err.mensagem || 'Não foi possível criar o acesso.') + '</div>';
        }
    } catch (err) {
        a.innerHTML = '<div class="alert alert-danger py-2 mb-0">Sem permissão ou erro de ligação ao servidor.</div>';
    }
});

// arranque
abrir('dashboard');
