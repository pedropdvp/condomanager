name: Deploy frontend estatico para GitHub Pages

# Nota: o GitHub Pages serve apenas conteudo estatico (HTML/CSS/JS).
# O backend Spring Boot (API REST/JWT/BD) NAO corre aqui; as chamadas a /api
# nao funcionam sem um backend implantado separadamente.

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Carregar artefacto (frontend estatico)
        uses: actions/upload-pages-artifact@v3
        with:
          path: condomanager/src/main/resources/static

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
