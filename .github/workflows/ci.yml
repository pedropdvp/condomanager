name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build + testes (unit + integração)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Os runners ubuntu-latest têm Docker, por isso os testes de integração
      # (Testcontainers/MySQL) correm aqui sem o problema do Docker Engine 29 local.
      - name: Build + testes (60 unit + 3 integração)
        run: mvn -B -ntp -Pintegration verify
